name: Keepalive Workflow

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:   # 保留手动触发便于测试

permissions:
  actions: write
  contents: write      # 👈 关键：允许读取和写入仓库文件

jobs:
  keepalive-job:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: gautamkrishnar/keepalive-workflow@v2
        # 默认使用 GITHUB_TOKEN，有了 contents: write 就可以正常工作
